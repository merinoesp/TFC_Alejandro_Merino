<!DOCTYPE html>

<body>
    <div class="cont">
        <h1>Borrar Anuncio</h1>
        <p>Estás seguro de que quieres borrar este anuncio?</p>
        <p>en caso de que lo borres, no podrás recuperarlo.</p>
        <br>
        <button class="button button-success" id="borrar">Si, Borrar</button>
        <br>
        <button class="button button-danger" id="no">No</button>
    </div>
    <div class="cont">
        <h1>Coche Vendido?</h1>
        <p>Enhorabuena, has cerrado tu primera venta!</p>
        <p>Asegurate de haber recibido el pago y que el vehículo esté en perfectas condiciones</p>
        <br>
        <button class="button button-success" id="vender">Si, Vender</button>
        <br>
        <button class="button button-danger" id="no-vender">No</button>
    </div>
</body>
